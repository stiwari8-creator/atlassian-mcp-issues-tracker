name: Daily Dashboard Update

on:
  schedule:
    - cron: '0 8 * * *'   # 8am UTC daily
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch latest GitHub issues + VOC data and rebuild dashboard
        env:
          GITHUB_TOKEN: ${{ secrets.DASHBOARD_TOKEN }}
          SOCRATES_TOKEN: ${{ secrets.SOCRATES_TOKEN }}
        run: python fetch_and_build.py

      - name: Commit and push updated dashboard
        run: |
          git config user.name "mcp-tracker-bot"
          git config user.email "bot@github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "🔄 Auto-update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
